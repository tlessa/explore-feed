<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>Explore Feed Animation</title>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <style>
    /* CSS Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    img, picture, video, canvas, svg {
      display: block;
      max-width: 100%;
    }

    /* Container */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* Responsive breakpoints */
    @media (min-width: 576px) {
      .container {
        padding: 0 1.5rem;
      }
    }

    @media (min-width: 768px) {
      .container {
        padding: 0 2rem;
      }
    }

    @media (min-width: 992px) {
      .container {
        padding: 0 2.5rem;
      }
    }

    @media (min-width: 1200px) {
      .container {
        padding: 0 3rem;
      }
    }
  </style>
</head>
<body>
  <header class="container">
    <!-- Header content -->
  </header>

  <main class="container">
    <lottie-player
      src="Explore Feed animation.json"
      background="transparent"
      speed="1"
      style="width: 100%; max-width: 329px; margin: 0 auto;"
      loop
      autoplay>
    </lottie-player>
  </main>

  <footer class="container">
    <!-- Footer content -->
  </footer>
</body>
</html>
